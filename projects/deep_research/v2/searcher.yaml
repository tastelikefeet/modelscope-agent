llm:
  service: openai
  model: qwen3.5-plus
  openai_api_key: <OPENAI_API_KEY>
  openai_base_url: <OPENAI_BASE_URL>


generation_config:
  stream: true
  stream_options:
    include_usage: true
  # Enable explicit prefix caching (auto-detects provider from openai_base_url)
  force_prefix_cache: true
  # Supports role names: system, user, assistant, tool, last_message
  prefix_cache_roles: [system, user, assistant, tool]
  extra_body:
    enable_thinking: false


tag: deep-research


prompt:
  root: prompts/
  agent: searcher
  lang: en
  family: gpt5


tools:
  file_system:
    mcp: false
    include:
      - write_file
      - read_file
      - list_files
  web_search:
    mcp: false
    engines:
      - exa
      - arxiv
    api_key: <EXA_API_KEY>
    max_results: 5
    fetcher: jina_reader
    fetch_content: true
    fetch_timeout: 60
    _max_concurrent_fetch: 5
    enable_chunking: false
    enable_summarization: true
    summarizer_model: qwen3.5-flash
    summarizer_base_url: <OPENAI_BASE_URL>
    summarizer_api_key: <OPENAI_API_KEY>
    max_content_chars: 200000
    summarizer_max_workers: 15
    summarization_timeout: 360
    _max_concurrent_summarization: 15
  evidence_store:
    mcp: false
    evidence_dir: evidence
    chunks_dir: chunks
    enable_chunk_storage: false
    include:
      - write_note
      - list_notes
      - get_note
      - load_index
      - search_notes
      - delete_note
  plugins:
    - tools/evidence_tool.py


handler: time_handler

callbacks:
  - callbacks/searcher_callback

max_chat_round: 30

# Round-aware reminder injected via SearcherCallback.on_generate_response.
round_reminder:
  enabled: true
  remind_at_round: 28

tool_call_timeout: 300

output_dir: ./output
