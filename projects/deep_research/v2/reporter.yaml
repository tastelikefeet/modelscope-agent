llm:
  service: openai
  model: qwen3.5-plus
  openai_api_key: <OPENAI_API_KEY>
  openai_base_url: <OPENAI_BASE_URL>


generation_config:
  stream: true
  stream_options:
    include_usage: true
  # Enable explicit prefix caching (auto-detects provider from openai_base_url)
  force_prefix_cache: true
  # Supports role names: system, user, assistant, tool, last_message
  prefix_cache_roles: [system, user, assistant, tool]
  extra_body:
    enable_thinking: false
  # show_reasoning: true
  # reasoning_output: stdout


tag: deep-research


prompt:
  root: prompts/
  agent: reporter
  lang: en
  family: gpt5

tools:
  file_system:
    mcp: false
    include:
      - write_file
      - read_file
      - list_files
      - replace_file_lines
  evidence_store:
    mcp: false
    evidence_dir: evidence
    include:
      - load_index
      - get_note
      - list_notes
      - get_analysis
      - list_analyses
  report_generator:
    mcp: false
    reports_dir: reports
  plugins:
    - tools/evidence_tool.py
    - tools/report_tool.py


handler: time_handler

code_file: reporter

callbacks:
  - callbacks/reporter_callback

max_chat_round: 36

# Round-aware reminder injected via ReporterCallback.on_generate_response.
round_reminder:
  enabled: true
  remind_at_round: 34

self_reflection:
  enabled: true
  max_retries: 3
  min_retention_ratio: 0.6
  post_report_guidance_enabled: false
  quality_check:
    enabled: true
    model: qwen3.5-flash

tool_call_timeout: 300

output_dir: ./output
